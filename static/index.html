<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brazo Robótico 3DOF</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="panel">
  <div>
    <h1>Brazo Robótico 3DOF</h1>
    <div class="subtitle">Simulación · FastAPI + Three.js</div>
  </div>

  <hr class="divider">

  <div class="ctrl-group">

    <div>
      <div class="ctrl-label">
        θ₁ Base (rotación Z)
        <span id="v1">0°</span>
      </div>
      <input type="range" id="s1" min="-180" max="180" value="0"
             oninput="onSlider()">
    </div>

    <div>
      <div class="ctrl-label">
        θ₂ Hombro
        <span id="v2">45°</span>
      </div>
      <input type="range" id="s2" min="0" max="150" value="45"
             oninput="onSlider()">
    </div>

    <div>
      <div class="ctrl-label">
        θ₃ Codo
        <span id="v3">90°</span>
      </div>
      <input type="range" id="s3" min="0" max="170" value="90"
             oninput="onSlider()">
    </div>

    <div>
      <div class="ctrl-label">
        Pinza
        <span id="vg">abierta</span>
      </div>
      <input type="range" id="sg" min="0" max="100" value="0"
             oninput="onSlider()">
    </div>

  </div>

  <hr class="divider">

  <div>
    <div class="ctrl-label" style="margin-bottom:8px">
      Efector final (XYZ)
    </div>
    <div class="info-grid">
      <div class="info-card">
        <div class="label">X</div>
        <div class="value" id="ex">—</div>
      </div>
      <div class="info-card">
        <div class="label">Y</div>
        <div class="value" id="ey">—</div>
      </div>
      <div class="info-card">
        <div class="label">Z</div>
        <div class="value" id="ez">—</div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <div class="btn-row">
    <button id="btn-demo" onclick="toggleDemo()">▶ Demo</button>
    <button onclick="resetHome()">↺ Reset</button>
  </div>

  <div id="status" class="status">conectando...</div>

  <hr class="divider">

  <div class="tip">
    Arrastra la escena para orbitar.<br>
    Rueda del mouse para zoom.
  </div>
</div>

<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
